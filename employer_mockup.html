<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사장님 전용관 디자인 미리보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #fcfcfc; }
        .shadow-soft { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-28">

    <!-- Nav -->
    <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 px-6 h-16 flex items-center gap-4 text-pink-500 shadow-sm">
        <div class="p-2 text-gray-400"><i class="fas fa-arrow-left text-lg"></i></div>
        <div class="flex-1 flex items-center gap-2">
            <i class="fas fa-briefcase text-xl text-pink-500"></i>
            <h1 class="text-lg font-black tracking-tighter uppercase text-gray-900">사장님 전용관 (디자인 미리보기)</h1>
        </div>
        <div class="flex items-center gap-2 p-2 text-gray-400">
            <i class="fas fa-sign-out-alt text-xl"></i>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 mt-10">
        <!-- Profile Summary -->
        <section class="bg-white border border-gray-100 rounded-[32px] p-6 mb-8 shadow-soft flex items-center gap-5">
            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500 border-2 border-white shadow-sm">
                <i class="fas fa-building text-2xl"></i>
            </div>
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-0.5">
                    <h2 class="text-[18px] font-black text-gray-900">바다바 알바타운</h2>
                    <span class="px-2 py-0.5 bg-blue-500 text-white rounded-md text-[9px] font-black">업소회원</span>
                </div>
                <span class="text-[13px] text-gray-400 font-bold">CEO 관리자</span>
            </div>
        </section>

        <!-- Listings Section -->
        <section>
            <div class="flex items-center justify-between mb-8 pl-1">
                <h3 class="text-[14px] font-black text-gray-900 uppercase tracking-tight">내가 올린 공고 <span class="text-pink-500">2</span></h3>
            </div>

            <div class="space-y-6">
                <!-- 1. ACTIVE JOB CASE (Updated with new design) -->
                <div class="bg-white border border-gray-100 rounded-[30px] p-6 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 right-0 px-4 py-1.5 bg-green-500 text-white text-[10px] font-black rounded-bl-2xl flex items-center gap-1.5">
                        <i class="fas fa-sync-alt animate-spin text-[10px]"></i> 자동 점프 가동중
                    </div>
                    
                    <div class="flex items-start justify-between mb-6">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 flex-wrap mb-2">
                                <span class="bg-gray-100 text-gray-600 text-[10px] font-black px-2 py-0.5 rounded border border-gray-200 shadow-sm">NO.1234</span>
                                
                                <!-- 1. VVIP 텍스트 배지 (배경 삭제, 12px) -->
                                <span class="text-[12px] font-black text-pink-500">VVIP</span>
                                
                                <!-- 2. 마감일 텍스트 배지 (배경 삭제, 12px) -->
                                <span class="text-[12px] font-black text-green-500">마감 25일 전</span>
                                
                                <span class="text-[11px] text-gray-400 font-bold ml-1">부산 중구 · 일반주점</span>
                            </div>
                            <h4 class="text-[16px] font-black text-gray-900 leading-tight">주말 파트타임 구합니다 (디자인 확인용)</h4>
                        </div>
                        <div class="text-right">
                            <p class="text-[15px] font-black text-pink-500">시급 12,000</p>
                        </div>
                    </div>

                    <!-- Auto Jump Settings -->
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-4">
                        <div class="flex items-center justify-between mb-3 text-gray-400">
                            <span class="text-[11px] font-black uppercase tracking-widest"><i class="fas fa-cog mr-1"></i> 자동 점프 설정</span>
                            <div class="w-9 h-5 bg-pink-500 rounded-full relative">
                                <div class="absolute right-1 top-1 bg-white w-3 h-3 rounded-full"></div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-3">
                            <!-- 4. 설정 저장 버튼 (블랙 스타일) -->
                            <button class="w-full py-4 bg-gray-900 hover:bg-black active:scale-[0.98] rounded-2xl text-[13px] font-black text-white shadow-lg transition flex items-center justify-center gap-2">
                                <span>✅ 점프 및 간격 설정 저장</span>
                            </button>
                            <!-- 5. 자동 계산 버튼 (무채색) -->
                            <button class="w-full py-3 bg-gray-100 text-gray-500 rounded-xl text-[12px] font-black hover:bg-gray-200 transition active:scale-[0.98]">
                                <span>🕒 마감일에 맞춰 간격 자동 계산</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <div class="flex-1 flex flex-col gap-2">
                            <!-- 실시간 점프 (기준 블랙) -->
                            <button class="w-full bg-gray-900 hover:bg-black active:scale-[0.98] flex items-center justify-center gap-2 py-4 rounded-2xl text-[13px] font-black text-white shadow-lg transition">
                                <i class="fas fa-rocket text-sm"></i> 실시간 점프
                            </button>
                            <!-- 6. 공고 연장 하기 (블랙 스타일) -->
                            <button class="w-full bg-gray-900 hover:bg-black active:scale-[0.98] flex items-center justify-center gap-2 py-4 rounded-2xl text-[13px] font-black text-white shadow-lg transition">
                                <i class="fas fa-bolt text-sm"></i> 공고 연장 하기
                            </button>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-400">
                                <i class="fas fa-edit text-lg"></i>
                            </div>
                            <div class="w-14 h-14 bg-red-50 border border-red-100 rounded-2xl flex items-center justify-center text-red-300">
                                <i class="fas fa-times text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. PENDING JOB CASE -->
                <div class="bg-white border border-gray-100 rounded-[30px] p-6 shadow-sm relative">
                    <div class="flex items-start justify-between mb-6">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 flex-wrap mb-2">
                                <span class="bg-gray-100 text-gray-600 text-[10px] font-black px-2 py-0.5 rounded border border-gray-200">NO.5678</span>
                                <!-- 결제대기 텍스트 배지 (배경 삭제, 12px) -->
                                <span class="text-[12px] font-black text-gray-900">결제대기</span>
                                <span class="text-[11px] text-gray-400 font-bold ml-1">서울 강남 · 카페</span>
                            </div>
                            <h4 class="text-[16px] font-black text-gray-900 leading-tight">결제 대기중인 공고 예시</h4>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <!-- 3. 결제 확인 / 활성 버튼 (블랙 스타일) -->
                        <button class="flex-1 flex items-center justify-center gap-2 py-4 rounded-2xl text-[13px] font-black transition active:scale-[0.98] bg-gray-900 text-white hover:bg-black shadow-lg">
                            <i class="fas fa-credit-card text-sm"></i> 결제 확인 / 활성
                        </button>
                        <div class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-2xl flex items-center justify-center text-gray-400">
                            <i class="fas fa-edit text-lg"></i>
                        </div>
                        <div class="w-14 h-14 bg-red-50 border border-red-100 rounded-2xl flex items-center justify-center text-red-300">
                            <i class="fas fa-times text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
